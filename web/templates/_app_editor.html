{{define "_app_editor.html"}}
<div x-data="appEditor()"
     x-show="open"
     @open-app-editor.window="onOpen($event.detail)"
     @keydown.escape.window="close()"
     x-transition.opacity.duration.150ms
     class="fixed inset-0 z-40 flex items-center justify-center bg-slate-900/50 p-4 backdrop-blur-sm"
     style="display: none">
  <div @click.away="close()"
       x-transition.duration.200ms
       class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-xl ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-800">
    <header class="mb-5 flex items-center justify-between">
      <h2 class="text-lg font-semibold" x-text="mode === 'create' ? 'Add app' : 'Edit app'"></h2>
      <button type="button" @click="close()" aria-label="Close"
              class="rounded p-1 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4"><path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/></svg>
      </button>
    </header>

    <form @submit.prevent="save()" class="space-y-4">
      <div x-show="error" x-text="error"
           class="rounded-lg bg-rose-50 px-3 py-2 text-sm text-rose-700 ring-1 ring-rose-200 dark:bg-rose-950/50 dark:text-rose-300 dark:ring-rose-900"
           role="alert"></div>

      <label class="block space-y-1">
        <span class="text-sm font-medium">Name</span>
        <input type="text" required maxlength="100" x-model="form.name"
               class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-300 dark:border-slate-700 dark:bg-slate-900 dark:focus:border-slate-500 dark:focus:ring-slate-700">
      </label>

      <label class="block space-y-1">
        <span class="text-sm font-medium">URL</span>
        <input type="url" required maxlength="2048" placeholder="https://app.example.com" x-model="form.url"
               class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-300 dark:border-slate-700 dark:bg-slate-900 dark:focus:border-slate-500 dark:focus:ring-slate-700">
      </label>

      <label class="block space-y-1">
        <span class="text-sm font-medium">Description <span class="text-slate-400">(optional)</span></span>
        <input type="text" maxlength="500" x-model="form.description"
               class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-300 dark:border-slate-700 dark:bg-slate-900 dark:focus:border-slate-500 dark:focus:ring-slate-700">
      </label>

      <label class="block space-y-1">
        <span class="text-sm font-medium">Category</span>
        <select x-model="form.category_id"
                class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-300 dark:border-slate-700 dark:bg-slate-900">
          <option value="">Uncategorized</option>
          <template x-for="c in categories" :key="c.id">
            <option :value="c.id" x-text="c.name"></option>
          </template>
        </select>
      </label>

      <div class="space-y-2">
        <span class="block text-sm font-medium">Icon</span>
        <div class="flex items-center gap-3">
          <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800">
            <template x-if="iconPreview">
              <img :src="iconPreview" alt="" class="h-10 w-10 rounded object-contain">
            </template>
            <template x-if="!iconPreview">
              <span class="text-xs text-slate-500" x-text="form.name ? form.name[0].toUpperCase() : '–'"></span>
            </template>
          </div>
          <input type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml,image/gif"
                 @change="onIconChange($event)"
                 class="block w-full text-sm text-slate-700 file:mr-3 file:rounded-md file:border-0 file:bg-slate-100 file:px-3 file:py-1.5 file:text-sm file:font-medium file:text-slate-700 hover:file:bg-slate-200 dark:text-slate-300 dark:file:bg-slate-800 dark:file:text-slate-200">
          <button type="button" x-show="form.icon_path" @click="clearIcon()"
                  class="text-xs text-slate-500 hover:text-rose-600">Remove</button>
        </div>
      </div>

      <label class="flex items-center gap-2 text-sm">
        <input type="checkbox" x-model="form.health_check_enabled"
               class="h-4 w-4 rounded border-slate-300 dark:border-slate-600">
        <span>Enable health check</span>
      </label>

      <label class="block space-y-1" x-show="form.health_check_enabled" x-transition.opacity>
        <span class="text-sm font-medium">Health check URL <span class="text-slate-400">(defaults to main URL)</span></span>
        <input type="url" maxlength="2048" placeholder="https://app.example.com/health" x-model="form.health_check_url"
               class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none transition focus:border-slate-400 focus:ring-2 focus:ring-slate-300 dark:border-slate-700 dark:bg-slate-900 dark:focus:border-slate-500 dark:focus:ring-slate-700">
      </label>

      <footer class="mt-6 flex items-center justify-between gap-2 pt-2">
        <button type="button" x-show="mode === 'edit'" @click="remove()"
                class="rounded-lg px-3 py-1.5 text-sm font-medium text-rose-600 hover:bg-rose-50 focus:outline-none focus:ring-2 focus:ring-rose-300 dark:hover:bg-rose-950/50">
          Delete
        </button>
        <div class="ml-auto flex gap-2">
          <button type="button" @click="close()"
                  class="rounded-lg px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">
            Cancel
          </button>
          <button type="submit" :disabled="saving"
                  class="inline-flex items-center gap-1 rounded-lg bg-slate-900 px-3 py-1.5 text-sm font-medium text-white shadow-sm transition hover:bg-slate-800 disabled:opacity-50 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white">
            <span x-text="saving ? 'Saving…' : (mode === 'create' ? 'Add' : 'Save')"></span>
          </button>
        </div>
      </footer>
    </form>
  </div>
</div>
{{end}}
