name: Release

on:
  push:
    branches:
      - "v*"
    tags:
      - "v*"

# Keyless cosign signing requires the workflow to mint an OIDC token; gh
# release create needs write access to repository contents.
permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      # Tailwind + JS need to land in web/static before the embed compiles.
      - name: prepare web assets
        run: |
          make tailwind-cli
          make tailwind
          make vendor-js

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build \
            -trimpath \
            -ldflags "-s -w \
              -X github.com/predsun/dashboard/internal/version.Version=${VERSION} \
              -X github.com/predsun/dashboard/internal/version.Commit=${COMMIT} \
              -X github.com/predsun/dashboard/internal/version.Date=${DATE}" \
            -o "dist/dashboard-${GOOS}-${GOARCH}" \
            ./cmd/dashboard

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/dashboard-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 1

  sign-and-release:
    name: sign & publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum dashboard-* > SHA256SUMS
          cat SHA256SUMS

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign SHA256SUMS (keyless OIDC)
        working-directory: dist
        run: |
          cosign sign-blob --yes \
            --bundle SHA256SUMS.bundle \
            SHA256SUMS

      - name: copy installer + systemd unit into release
        run: |
          cp scripts/install.sh dist/install.sh
          cp deploy/dashboard.service dist/dashboard.service

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --target "${GITHUB_SHA}" \
            --generate-notes \
            dist/dashboard-linux-amd64 \
            dist/dashboard-linux-arm64 \
            dist/dashboard-darwin-arm64 \
            dist/SHA256SUMS \
            dist/SHA256SUMS.bundle \
            dist/install.sh \
            dist/dashboard.service
